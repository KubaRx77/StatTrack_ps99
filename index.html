<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Sim 99 | StatTrack</title>
    <style>
        :root {
            --bg-color: #0f172a;        /* Bardzo ciemne tło strony */
            --sidebar-bg: #1e293b;     /* Ciemne tło panelu bocznego */
            --card-bg: #1e293b;         /* Ciemne tła kart i tabeli */
            --text-color: #f1f5f9;      /* Jasny tekst główny */
            --text-secondary: #94a3b8;  /* Szary tekst pomocniczy */
            --border-color: #334155;    /* Ciemniejsze obramowania */
            --accent-blue: #38bdf8;     /* Jaśniejszy błękit */
            --accent-green: #4ade80;    /* Soczysta zieleń */
            --accent-pink: #f472b6;     /* Jasny róż */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            min-height: 100vh;
        }

        /* --- PANEL BOCZNY (SIDEBAR) --- */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            padding: 24px 16px;
            box-sizing: border-box;
            z-index: 100;
        }

        .sidebar-top {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Logo u góry panelu */
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
            text-decoration: none;
        }
        
        .logo-icon {
            color: var(--accent-blue);
            font-size: 22px;
        }

        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--text-secondary);
            letter-spacing: 1px;
            margin-bottom: 8px;
            padding-left: 8px;
        }

        .menu-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            color: #e2e8f0;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s, color 0.2s;
        }

        .menu-item:hover, .menu-item.active {
            background-color: #334155;
            color: #ffffff;
        }

        /* Styl dla logotypu Pet Simulator 99 w menu */
        .menu-item img {
            width: 24px;
            height: 24px;
            object-fit: contain;
        }

        /* Profil użytkownika na dole panelu */
        .user-profile {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 8px;
            border-top: 1px solid var(--border-color);
            margin-top: auto;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #475569;
            object-fit: cover;
        }

        .user-details {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
        }

        .user-role {
            font-size: 12px;
            color: var(--accent-blue);
            font-weight: 500;
        }

        .profile-more {
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
        }

        /* --- GŁÓWNA ZAWARTOŚĆ STRONY --- */
        .main-content {
            margin-left: 260px; /* Przesunięcie o szerokość panelu */
            flex-grow: 1;
            padding: 40px;
            box-sizing: border-box;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        header h1 {
            margin: 0;
            font-size: 26px;
            font-weight: 700;
            color: #ffffff;
        }

        /* Górne kafelki podsumowujące */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
        }

        .stat-card .title {
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-card .value {
            font-size: 24px;
            font-weight: 700;
        }

        .stat-card.online .value { color: var(--accent-green); }
        .stat-card.gems .value { color: var(--accent-blue); }
        .stat-card.huge .value { color: var(--accent-pink); }
        .stat-card.titanic .value { color: #22d3ee; }

        /* Styl dla ikonek w kafelkach i tabeli */
        .item-icon {
            width: 22px;
            height: 22px;
            vertical-align: middle;
            object-fit: contain;
        }

        /* Tabela z kontami */
        .table-container {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: #1e293b;
            color: var(--text-secondary);
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 600;
            padding: 14px 20px;
            border-bottom: 2px solid var(--border-color);
        }

        /* Kontener dla nagłówków z flexboxem */
        .th-flex {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        td {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
            color: #e2e8f0;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background-color: #334155;
        }

        .badge {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 12px;
        }

        /* Odznaki */
        .badge-gems { background-color: rgba(14, 165, 233, 0.15); color: #38bdf8; border: 1px solid rgba(14, 165, 233, 0.3); }
        .badge-huge { background-color: rgba(236, 72, 153, 0.15); color: #f472b6; border: 1px solid rgba(236, 72, 153, 0.3); }
        .badge-titanic { background-color: rgba(6, 182, 212, 0.15); color: #22d3ee; border: 1px solid rgba(6, 182, 212, 0.3); }

        /* Kropka statusu */
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 10px;
        }
        .status-dot.online { background-color: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); }
        .status-dot.offline { background-color: #64748b; }

        .account-name {
            font-weight: 600;
            color: #ffffff;
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body>

    <!-- --- PANEL BOCZNY (SIDEBAR) --- -->
    <div class="sidebar">
        <div class="sidebar-top">
            <!-- Nazwa strony -->
            <a href="#" class="logo">
                <span class="logo-icon">📊</span> TrackStat
            </a>

            <!-- Sekcja gry -->
            <div>
                <div class="section-title">Games</div>
                <div class="menu-list">
                    <a href="#" class="menu-item active">
                        <img src="https://yummytrackstat.com/items/pet-simulator-99/logo.webp" alt="PS99 Logo">
                        Pet Simulator 99
                    </a>
                </div>
            </div>
        </div>

        <!-- Profil kubarx7 na dole -->
        <div class="user-profile">
            <div class="user-info">
                <div class="user-avatar" style="background: #111827; display: flex; align-items: center; justify-content: center; font-size: 18px;">👤</div>
                <div class="user-details">
                    <span class="user-name">kubarx7</span>
                    <span class="user-role">Premium</span>
                </div>
            </div>
            <div class="profile-more">⋮</div>
        </div>
    </div>

    <!-- --- GŁÓWNA ZAWARTOŚĆ STRONY --- -->
    <div class="main-content">
        <div class="container">
            <header>
                <h1>Pet Simulator 99 Dashboard</h1>
            </header>

            <!-- Górne statystyki łączone ze wszystkich kont -->
            <div class="stats-grid">
                <div class="stat-card online">
                    <span class="title">🤖 Online / Total</span>
                    <span id="online-counter" class="value">0/0</span>
                </div>
                <div class="stat-card gems">
                    <span class="title">
                        <img src="https://yummytrackstat.com/items/pet-simulator-99/gem.webp" class="item-icon" alt="Gems"> Total Gems
                    </span>
                    <span id="total-gems" class="value">0.00 B</span>
                </div>
                <div class="stat-card huge">
                    <span class="title">
                        <img src="https://yummytrackstat.com/items/pet-simulator-99/total_huge.webp" class="item-icon" alt="Huge"> Total Huge
                    </span>
                    <span id="total-huge" class="value">0</span>
                </div>
                <div class="stat-card titanic">
                    <span class="title">
                        <img src="https://yummytrackstat.com/items/pet-simulator-99/titanic.webp" class="item-icon" alt="Titanic"> Total Titanic
                    </span>
                    <span id="total-titanic" class="value">0</span>
                </div>
            </div>

            <!-- Tabela kont -->
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Account</th>
                            <th>
                                <div class="th-flex">
                                    <img src="https://yummytrackstat.com/items/pet-simulator-99/gem.webp" class="item-icon" alt="Gems"> Gems
                                </div>
                            </th>
                            <th>
                                <div class="th-flex">
                                    <img src="https://yummytrackstat.com/items/pet-simulator-99/total_huge.webp" class="item-icon" alt="Huge"> Huge
                                </div>
                            </th>
                            <th>
                                <div class="th-flex">
                                    <img src="https://yummytrackstat.com/items/pet-simulator-99/titanic.webp" class="item-icon" alt="Titanic"> Titanic
                                </div>
                            </th>
                        </tr>
                    </thead>
                    <tbody id="accounts-table-body">
                        <tr>
                            <td colspan="4" style="text-align: center; color: var(--text-secondary); padding: 30px;">
                                Czekam na dane ze skryptu...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const FIREBASE_URL = "https://stattrack-1eff0-default-rtdb.firebaseio.com/stats.json";

        async function fetchAllStats() {
            try {
                const res = await fetch(FIREBASE_URL);
                const data = await res.json();
                
                if (!data) {
                    document.getElementById('online-counter').innerText = "0/0";
                    return;
                }

                const tableBody = document.getElementById('accounts-table-body');
                tableBody.innerHTML = ''; 

                let totalGems = 0;
                let totalHuge = 0;
                let totalTitanic = 0;
                
                let totalAccounts = 0;
                let onlineAccounts = 0;

                const nowSeconds = Math.floor(Date.now() / 1000); 

                Object.keys(data).forEach(accountKey => {
                    const account = data[accountKey];
                    
                    if (!account) return;

                    totalAccounts++;

                    const username = account.username || accountKey;
                    const gems = account.diamonds || 0;
                    const huge = account.hugePets || 0;
                    const titanic = account.titanicPets || 0;
                    
                    const lastActive = account.lastActive || 0;
                    const isOnline = (nowSeconds - lastActive) < 45;

                    if (isOnline) {
                        onlineAccounts++;
                    }

                    totalGems += gems;
                    totalHuge += huge;
                    totalTitanic += titanic;

                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td class="account-name">
                            <span class="status-dot ${isOnline ? 'online' : 'offline'}"></span>
                            ${username}
                        </td>
                        <td><span class="badge badge-gems">${(gems / 1000000).toFixed(2)}M</span></td>
                        <td><span class="badge badge-huge">${huge}</span></td>
                        <td><span class="badge badge-titanic">${titanic}</span></td>
                    `;
                    tableBody.appendChild(row);
                });

                document.getElementById('online-counter').innerText = `${onlineAccounts}/${totalAccounts}`;

                if (totalGems >= 1000000000) {
                    document.getElementById('total-gems').innerText = (totalGems / 1000000000).toFixed(2) + " B";
                } else {
                    document.getElementById('total-gems').innerText = (totalGems / 1000000).toFixed(2) + " M";
                }
                
                document.getElementById('total-huge').innerText = totalHuge;
                document.getElementById('total-titanic').innerText = totalTitanic;

            } catch (e) {
                console.error("Błąd podczas pobierania danych z Firebase:", e);
            }
        }

        setInterval(fetchAllStats, 3000);
        fetchAllStats();
    </script>
</body>
</html>
