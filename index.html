<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Sim 99 | StatTrack</title>
    <style>
        /* PROFIL PRAWDZIWEJ CZERNI (TRUE BLACK / CHARCOAL) - BEZ NIEBIESKIEGO TONU */
        :root {
            --bg-color: #0a0a0a;        /* Głębokie, czyste czarne tło */
            --sidebar-bg: #121212;     /* Ciemnoszary węgiel dla panelu bocznego */
            --card-bg: #121212;         /* Ciemnoszary węgiel dla kart i tabeli */
            --text-color: #f5f5f5;      /* Czysty jasny tekst */
            --text-secondary: #a3a3a3;  /* Neutralny szary tekst pomocniczy */
            --border-color: #262626;    /* Neutralne ciemnoszare ramki */
            --accent-blue: #ffffff;     /* Biały/srebrny jako główny neutralny akcent zamiast niebieskiego */
            --accent-green: #22c55e;    /* Soczysta zieleń online */
            --accent-pink: #ec4899;     /* Róż dla Huge */
            --hover-row: #1e1e1e;       /* Ciemny hover w tabeli */
            --dropdown-bg: #171717;     /* Tło menu rozwijanego */
        }

        /* PROFIL JASNEGO MOTYWU (LIGHT) */
        [data-theme="light"] {
            --bg-color: #f8fafc;        
            --sidebar-bg: #ffffff;     
            --card-bg: #ffffff;         
            --text-color: #0f172a;      
            --text-secondary: #64748b;  
            --border-color: #e2e8f0;    
            --accent-blue: #0f172a;     
            --accent-green: #16a34a;    
            --accent-pink: #db2777;     
            --hover-row: #f1f5f9;       
            --dropdown-bg: #ffffff;     
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        /* --- PANEL BOCZNY (SIDEBAR) --- */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            padding: 24px 16px;
            box-sizing: border-box;
            z-index: 100;
            transition: background-color 0.3s, border-color 0.3s;
        }

        .sidebar-top {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Logo u góry panelu */
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: 700;
            color: var(--text-color);
            text-decoration: none;
        }
        
        .logo-icon {
            color: var(--text-color);
            font-size: 22px;
        }

        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--text-secondary);
            letter-spacing: 1px;
            margin-bottom: 8px;
            padding-left: 8px;
        }

        .menu-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            color: var(--text-color);
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s, color 0.2s;
        }

        .menu-item:hover, .menu-item.active {
            background-color: var(--hover-row);
        }

        /* Logotyp Pet Simulator 99 */
        .menu-item img {
            width: 24px;
            height: 24px;
            object-fit: contain;
        }

        /* Profil użytkownika na dole panelu */
        .user-profile {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 8px;
            border-top: 1px solid var(--border-color);
            margin-top: auto;
            position: relative;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #262626;
            object-fit: cover;
            border: 1px solid var(--border-color);
        }

        .user-details {
            display: flex;
            flex-direction: column;
        }

        /* Kontener na nazwę i ikonkę GIF */
        .user-name-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .user-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-color);
        }

        .user-gif {
            width: 16px;
            height: 16px;
            object-fit: contain;
        }

        .user-role {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .profile-more {
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 20px;
            padding: 4px 8px;
            border-radius: 6px;
            transition: background-color 0.2s;
        }

        .profile-more:hover {
            background-color: var(--hover-row);
        }

        /* --- ROZWIJANE MENU WYBORU KOLORU --- */
        .theme-dropdown {
            display: none;
            position: absolute;
            bottom: 60px;
            right: 8px;
            background-color: var(--dropdown-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            width: 140px;
            padding: 6px;
            z-index: 200;
            flex-direction: column;
            gap: 2px;
        }

        .theme-dropdown.show {
            display: flex;
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            color: var(--text-color);
            font-size: 13px;
            font-weight: 500;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            cursor: pointer;
            border-radius: 6px;
            transition: background-color 0.2s;
        }

        .dropdown-item:hover {
            background-color: var(--hover-row);
        }

        /* --- GŁÓWNA ZAWARTOŚĆ STRONY --- */
        .main-content {
            margin-left: 260px;
            flex-grow: 1;
            padding: 40px;
            box-sizing: border-box;
            transition: padding 0.3s;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            transition: border-color 0.3s;
        }

        header h1 {
            margin: 0;
            font-size: 26px;
            font-weight: 700;
            color: var(--text-color);
        }

        /* Górne kafelki podsumowujące */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s, border-color 0.3s;
        }

        .stat-card .title {
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-card .value {
            font-size: 24px;
            font-weight: 700;
        }

        .stat-card.online .value { color: var(--accent-green); }
        .stat-card.gems .value { color: #f5f5f5; }
        .stat-card.huge .value { color: var(--accent-pink); }
        .stat-card.titanic .value { color: #a3a3a3; }

        /* Styl dla ikonek */
        .item-icon {
            width: 22px;
            height: 22px;
            vertical-align: middle;
            object-fit: contain;
        }

        /* Tabela z kontami */
        .table-container {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            overflow-x: auto;
            transition: background-color 0.3s, border-color 0.3s;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: var(--card-bg);
            color: var(--text-secondary);
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 600;
            padding: 14px 20px;
            border-bottom: 2px solid var(--border-color);
            transition: background-color 0.3s, border-color 0.3s;
        }

        .th-flex {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        td {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
            color: var(--text-color);
            transition: border-color 0.3s, color 0.3s;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background-color: var(--hover-row);
        }

        .badge {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 12px;
        }

        /* Odznaki dopasowane do neutralnego czarnego schematu */
        .badge-gems { background-color: rgba(245, 245, 245, 0.08); color: var(--text-color); border: 1px solid rgba(245, 245, 245, 0.15); }
        .badge-huge { background-color: rgba(236, 72, 153, 0.12); color: var(--accent-pink); border: 1px solid rgba(236, 72, 153, 0.25); }
        .badge-titanic { background-color: rgba(163, 163, 163, 0.1); color: var(--text-secondary); border: 1px solid rgba(163, 163, 163, 0.2); }

        /* Kropka statusu */
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 10px;
        }
        .status-dot.online { background-color: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); }
        .status-dot.offline { background-color: #525252; }

        .account-name {
            font-weight: 600;
            color: var(--text-color);
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body>

    <!-- --- PANEL BOCZNY (SIDEBAR) --- -->
    <div class="sidebar">
        <div class="sidebar-top">
            <!-- Nazwa strony -->
            <a href="#" class="logo">
                <span class="logo-icon">📊</span> TrackStat
            </a>

            <!-- Sekcja gry -->
            <div>
                <div class="section-title">Games</div>
                <div class="menu-list">
                    <a href="#" class="menu-item active">
                        <img src="https://yummytrackstat.com/items/pet-simulator-99/logo.webp" alt="PS99 Logo">
                        Pet Simulator 99
                    </a>
                </div>
            </div>
        </div>

        <!-- Profil kubarx7 z Twoim nowym zdjęciem profilowym -->
        <div class="user-profile">
            <div class="user-info">
                <!-- Twoje nowe zdjęcie profilowe z przesłanego obrazka -->
                <img src="https://i.imgur.com/gK6B4Tz.png" alt="kubarx7 avatar" class="user-avatar">
                <div class="user-details">
                    <div class="user-name-wrapper">
                        <span class="user-name">kubarx7</span>
                        <!-- Twój spersonalizowany GIF -->
                        <img src="https://i.imgur.com/ObQ0Xvd.gif" alt="Verified/Special Effect" class="user-gif">
                    </div>
                    <!-- Ranga Owner -->
                    <span class="user-role">Owner</span>
                </div>
            </div>
            
            <!-- Trzy Kropki (Kliknięcie otwiera menu) -->
            <div class="profile-more" id="theme-btn">⋮</div>

            <!-- Rozwijane Menu Wyboru Koloru -->
            <div class="theme-dropdown" id="theme-dropdown">
                <button class="dropdown-item" onclick="setTheme('dark')">
                    🌑 Czarny tło
                </button>
                <button class="dropdown-item" onclick="setTheme('light')">
                    ☀️ Biały tło
                </button>
            </div>
        </div>
    </div>

    <!-- --- GŁÓWNA ZAWARTOŚĆ STRONY --- -->
    <div class="main-content">
        <div class="container">
            <header>
                <h1>Pet Simulator 99 Dashboard</h1>
            </header>

            <!-- Górne statystyki łączone ze wszystkich kont -->
            <div class="stats-grid">
                <div class="stat-card online">
                    <span class="title">🤖 Online / Total</span>
                    <span id="online-counter" class="value">0/0</span>
                </div>
                <div class="stat-card gems">
                    <span class="title">
                        <img src="https://yummytrackstat.com/items/pet-simulator-99/gem.webp" class="item-icon" alt="Gems"> Total Gems
                    </span>
                    <span id="total-gems" class="value">0.00 B</span>
                </div>
                <div class="stat-card huge">
                    <span class="title">
                        <img src="https://yummytrackstat.com/items/pet-simulator-99/total_huge.webp" class="item-icon" alt="Huge"> Total Huge
                    </span>
                    <span id="total-huge" class="value">0</span>
                </div>
                <div class="stat-card titanic">
                    <span class="title">
                        <img src="https://yummytrackstat.com/items/pet-simulator-99/titanic.webp" class="item-icon" alt="Titanic"> Total Titanic
                    </span>
                    <span id="total-titanic" class="value">0</span>
                </div>
            </div>

            <!-- Tabela kont -->
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Account</th>
                            <th>
                                <div class="th-flex">
                                    <img src="https://yummytrackstat.com/items/pet-simulator-99/gem.webp" class="item-icon" alt="Gems"> Gems
                                </div>
                            </th>
                            <th>
                                <div class="th-flex">
                                    <img src="https://yummytrackstat.com/items/pet-simulator-99/total_huge.webp" class="item-icon" alt="Huge"> Huge
                                </div>
                            </th>
                            <th>
                                <div class="th-flex">
                                    <img src="https://yummytrackstat.com/items/pet-simulator-99/titanic.webp" class="item-icon" alt="Titanic"> Titanic
                                </div>
                            </th>
                        </tr>
                    </thead>
                    <tbody id="accounts-table-body">
                        <tr>
                            <td colspan="4" style="text-align: center; color: var(--text-secondary); padding: 30px;">
                                Czekam na dane ze skryptu...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // --- OBSŁUGA MOTYWÓW ---
        const themeBtn = document.getElementById('theme-btn');
        const themeDropdown = document.getElementById('theme-dropdown');

        themeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            themeDropdown.classList.toggle('show');
        });

        document.addEventListener('click', () => {
            themeDropdown.classList.remove('show');
        });

        function setTheme(theme) {
            if (theme === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'dark');
            }
            themeDropdown.classList.remove('show');
        }

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            setTheme('light');
        } else {
            setTheme('dark');
        }

        // --- OBSŁUGA POBIERANIA DANYCH Z FIREBASE ---
        const FIREBASE_URL = "https://stattrack-1eff0-default-rtdb.firebaseio.com/stats.json";

        async function fetchAllStats() {
            try {
                const res = await fetch(FIREBASE_URL);
                const data = await res.json();
                
                if (!data) {
                    document.getElementById('online-counter').innerText = "0/0";
                    return;
                }

                const tableBody = document.getElementById('accounts-table-body');
                tableBody.innerHTML = ''; 

                let totalGems = 0;
                let totalHuge = 0;
                let totalTitanic = 0;
                
                let totalAccounts = 0;
                let onlineAccounts = 0;

                const nowSeconds = Math.floor(Date.now() / 1000); 

                Object.keys(data).forEach(accountKey => {
                    const account = data[accountKey];
                    
                    if (!account) return;

                    totalAccounts++;

                    const username = account.username || accountKey;
                    const gems = account.diamonds || 0;
                    const huge = account.hugePets || 0;
                    const titanic = account.titanicPets || 0;
                    
                    const lastActive = account.lastActive || 0;
                    const isOnline = (nowSeconds - lastActive) < 45;

                    if (isOnline) {
                        onlineAccounts++;
                    }

                    totalGems += gems;
                    totalHuge += huge;
                    totalTitanic += titanic;

                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td class="account-name">
                            <span class="status-dot ${isOnline ? 'online' : 'offline'}"></span>
                            ${username}
                        </td>
                        <td><span class="badge badge-gems">${(gems / 1000000).toFixed(2)}M</span></td>
                        <td><span class="badge badge-huge">${huge}</span></td>
                        <td><span class="badge badge-titanic">${titanic}</span></td>
                    `;
                    tableBody.appendChild(row);
                });

                document.getElementById('online-counter').innerText = `${onlineAccounts}/${totalAccounts}`;

                if (totalGems >= 1000000000) {
                    document.getElementById('total-gems').innerText = (totalGems / 1000000000).toFixed(2) + " B";
                } else {
                    document.getElementById('total-gems').innerText = (totalGems / 1000000).toFixed(2) + " M";
                }
                
                document.getElementById('total-huge').innerText = totalHuge;
                document.getElementById('total-titanic').innerText = totalTitanic;

            } catch (e) {
                console.error("Błąd podczas pobierania danych z Firebase:", e);
            }
        }

        setInterval(fetchAllStats, 3000);
        fetchAllStats();
    </script>
</body>
</html>
